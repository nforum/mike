# ─────────────────────────────────────────────────────────────────────
#  MikeOSS — Cloud Build pipeline (one-shot deploy of backend + frontend)
#
#  Usage from the repo root:
#      gcloud builds submit \
#        --region=europe-west1 \
#        --config=cloudbuild.yaml \
#        --project=mikeoss-495610
#
#  IMPORTANT: --region pins the Cloud Build *workers* (and source bucket)
#  to europe-west1, matching where Artifact Registry and Cloud Run live.
#  Without it, gcloud defaults to the "global" region (US workers) which
#  works but pays cross-Atlantic egress on every Docker layer.
#
#  What this does:
#    1. Build the Word add-in into frontend/public/word-addin/
#       (the manifest's ${ADDIN_URL} placeholder is replaced with
#       _FRONTEND_URL so iconUrl, taskpane URL, etc. are absolute).
#    2. Build + push the frontend Docker image to the same Artifact
#       Registry repo Cloud Run was already using.
#    3. Deploy mike-frontend on Cloud Run.
#    4. Build + push the backend Docker image.
#    5. Deploy mike-backend on Cloud Run.
#
#  We purposefully do not couple the two services: if either build
#  fails, the other is not redeployed. Cloud Build runs the steps
#  sequentially by default.
# ─────────────────────────────────────────────────────────────────────

substitutions:
    _REGION: europe-west1
    _REPO: cloud-run-source-deploy
    _FRONTEND_SERVICE: mike-frontend
    _BACKEND_SERVICE: mike-backend
    # The public URL the frontend (and the Word manifest) live at.
    # Override with --substitutions if you ever rename the service.
    _FRONTEND_URL: https://mike-frontend-cc6nrgescq-ew.a.run.app
    # The public URL the backend exposes — baked into the frontend at
    # build time as NEXT_PUBLIC_API_BASE_URL.
    _BACKEND_URL: https://mike-backend-cc6nrgescq-ew.a.run.app

options:
    logging: CLOUD_LOGGING_ONLY
    machineType: E2_HIGHCPU_8

steps:
    # ── 1. Word add-in: install + build into frontend/public/word-addin/ ─
    - id: word-addin-install
      name: node:22-slim
      dir: word-addin
      entrypoint: bash
      args:
          - -c
          - |
              set -euo pipefail
              npm ci --no-audit --no-fund

    - id: word-addin-build
      name: node:22-slim
      dir: word-addin
      waitFor: [word-addin-install]
      env:
          # ADDIN_URL is substituted into manifest.xml so iconUrl, taskpane
          # URL etc. become absolute. API_BASE_URL is webpacked into the
          # taskpane bundle as `process.env.API_BASE_URL` so the add-in
          # calls /auth/pair/redeem on the backend, not on the frontend
          # origin that serves the taskpane HTML.
          - "ADDIN_URL=${_FRONTEND_URL}"
          - "API_BASE_URL=${_BACKEND_URL}"
      entrypoint: bash
      args:
          - -c
          # NOTE: $$ escapes Cloud Build's substitution layer so the literal
          #       string "${ADDIN_URL}" reaches grep. Without it, Cloud Build
          #       tries to resolve `${ADDIN_URL}` as a built-in substitution
          #       (which it isn't) and fails the build.
          - |
              set -euo pipefail
              npm run build
              echo "--- frontend/public/word-addin/ contents ---"
              ls -la ../frontend/public/word-addin/
              if grep -q '$${ADDIN_URL}' ../frontend/public/word-addin/manifest.xml; then
                  echo "ERROR: manifest still has unsubstituted placeholders"
                  exit 1
              fi

    # ── 2. Frontend: docker build (includes the freshly emitted addin) ──
    - id: frontend-build
      name: gcr.io/cloud-builders/docker
      waitFor: [word-addin-build]
      dir: frontend
      args:
          - build
          - --build-arg
          - "NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL}"
          - --build-arg
          - "NEXT_PUBLIC_API_BASE_URL=${_BACKEND_URL}"
          - --tag
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}"
          - --tag
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}:latest"
          - .

    - id: frontend-push
      name: gcr.io/cloud-builders/docker
      waitFor: [frontend-build]
      args:
          - push
          - --all-tags
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}"

    - id: frontend-deploy
      name: gcr.io/google.com/cloudsdktool/cloud-sdk
      waitFor: [frontend-push]
      entrypoint: gcloud
      args:
          - run
          - deploy
          - "${_FRONTEND_SERVICE}"
          - --image
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}"
          - --region
          - "${_REGION}"
          - --project
          - "${PROJECT_ID}"
          - --quiet

    # ── 3. Backend: docker build + push + deploy ────────────────────────
    - id: backend-build
      name: gcr.io/cloud-builders/docker
      waitFor: ["-"]  # parallel with the addin/frontend chain
      dir: backend
      args:
          - build
          - --tag
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}"
          - --tag
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:latest"
          - .

    - id: backend-push
      name: gcr.io/cloud-builders/docker
      waitFor: [backend-build]
      args:
          - push
          - --all-tags
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}"

    - id: backend-deploy
      name: gcr.io/google.com/cloudsdktool/cloud-sdk
      waitFor: [backend-push]
      entrypoint: gcloud
      args:
          - run
          - deploy
          - "${_BACKEND_SERVICE}"
          - --image
          - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}"
          - --region
          - "${_REGION}"
          - --project
          - "${PROJECT_ID}"
          - --quiet

images:
    - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}"
    - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_FRONTEND_SERVICE}:latest"
    - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}"
    - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:latest"

timeout: 1800s
